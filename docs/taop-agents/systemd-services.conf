# TAOP Agent Workforce — Systemd Services
# Copy these to /etc/systemd/system/ on your Ubuntu server

# ── Dashboard Service ─────────────────────────────────
# File: /etc/systemd/system/taop-dashboard.service

[Unit]
Description=TAOP Agent Workforce — Streamlit Dashboard
After=network.target

[Service]
Type=simple
User=johan
WorkingDirectory=/home/johan/taop-agents
Environment=PATH=/home/johan/.local/bin:/usr/bin:/bin
ExecStart=/home/johan/.local/bin/streamlit run interfaces/dashboard.py --server.port 8501 --server.address 0.0.0.0
Restart=always
RestartSec=5

[Install]
WantedBy=multi-user.target


# ── Telegram Bot Service ──────────────────────────────
# File: /etc/systemd/system/taop-bot.service

[Unit]
Description=TAOP Agent Workforce — Telegram Bot
After=network.target

[Service]
Type=simple
User=johan
WorkingDirectory=/home/johan/taop-agents
ExecStart=/usr/bin/python3 interfaces/telegram_bot.py
Restart=always
RestartSec=5

[Install]
WantedBy=multi-user.target


# ── Setup Commands ────────────────────────────────────
# sudo cp taop-dashboard.service /etc/systemd/system/
# sudo cp taop-bot.service /etc/systemd/system/
# sudo systemctl daemon-reload
# sudo systemctl enable taop-dashboard taop-bot
# sudo systemctl start taop-dashboard taop-bot
# sudo systemctl status taop-dashboard taop-bot
