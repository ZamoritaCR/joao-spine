<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOÃO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Lexend', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 16px 24px;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 4px;
      color: #888;
    }

    #loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #222;
      border-top-color: #666;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p {
      font-size: 13px;
      font-weight: 300;
      color: #555;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.assistant {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #222;
      color: #ccc;
    }

    .message.user {
      align-self: flex-end;
      background: #1c2a1c;
      border: 1px solid #2a3a2a;
      color: #d0e0d0;
    }

    .thinking-indicator {
      align-self: flex-start;
      font-size: 13px;
      font-weight: 300;
      color: #555;
      padding: 8px 0;
    }

    #input-area {
      flex-shrink: 0;
      padding: 16px 24px;
      border-top: 1px solid #161616;
      display: none;
    }

    #input-area form {
      display: flex;
      gap: 12px;
    }

    #input-area input {
      flex: 1;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'Lexend', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: #e0e0e0;
      outline: none;
      transition: border-color 0.2s;
    }

    #input-area input:focus {
      border-color: #333;
    }

    #input-area input::placeholder {
      color: #444;
    }

    #input-area button {
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 12px 20px;
      font-family: 'Lexend', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    #input-area button:hover {
      background: #222;
      color: #aaa;
    }

    #input-area button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #chat-container::-webkit-scrollbar { width: 4px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    #error-banner {
      display: none;
      padding: 12px 24px;
      background: #1a1212;
      border-bottom: 1px solid #2a1a1a;
      color: #cc6666;
      font-size: 13px;
      font-weight: 300;
    }

    /* Voice button */
    #voice-wrapper {
      position: fixed;
      top: 12px;
      right: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 100;
    }

    #mic-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #333;
      background: #1a1a1a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    #mic-btn svg {
      width: 20px;
      height: 20px;
      fill: #666;
      transition: fill 0.3s;
    }

    #mic-btn:hover {
      background: #222;
      border-color: #444;
    }

    #mic-btn.connecting {
      animation: pulse 1.2s ease-in-out infinite;
      border-color: #555;
    }

    #mic-btn.active {
      background: #1a2e1a;
      border-color: #3a6a3a;
      box-shadow: 0 0 12px rgba(80, 200, 80, 0.25);
    }

    #mic-btn.active svg {
      fill: #5c5;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    #voice-status {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 1.5px;
      color: #555;
      display: none;
    }

    #voice-status.visible {
      display: block;
      color: #5c5;
    }
  </style>
</head>
<body>

  <div id="header"><h1>JOÃO</h1></div>

  <div id="voice-wrapper">
    <button id="mic-btn" title="Voice chat">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <span id="voice-status">VOICE ACTIVE</span>
  </div>

  <div id="error-banner"></div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Loading context...</p>
  </div>

  <div id="chat-container"></div>

  <div id="input-area">
    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Message JOÃO..." autocomplete="off">
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script>
    // ============================================================
    // CONFIG — No secrets here. All API calls go through the
    // Railway backend proxy which holds the Anthropic key.
    // ============================================================
    const CONFIG = {
      RAILWAY_URL: "https://joao-spine-production.up.railway.app",
      TUNNEL_URL: "https://route-reasonably-mario-portraits.trycloudflare.com",
    };
    // ============================================================

    const $ = (sel) => document.querySelector(sel);
    const loadingEl   = $("#loading");
    const chatEl      = $("#chat-container");
    const inputArea   = $("#input-area");
    const chatForm    = $("#chat-form");
    const userInput   = $("#user-input");
    const sendBtn     = $("#send-btn");
    const errorBanner = $("#error-banner");

    let conversationMessages = [];

    // Log message via tunnel (fire and forget)
    function logToTunnel(role, content) {
      fetch(`${CONFIG.TUNNEL_URL}/joao/log`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ role, content }),
      }).catch((e) => console.warn("Tunnel log failed:", e));
    }

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.style.display = "block";
    }

    function clearError() {
      errorBanner.style.display = "none";
    }

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    function showThinking() {
      const div = document.createElement("div");
      div.className = "thinking-indicator";
      div.id = "thinking";
      div.textContent = "JOÃO is thinking...";
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function hideThinking() {
      const el = $("#thinking");
      if (el) el.remove();
    }

    // Verify backend is reachable on load
    async function loadContext() {
      try {
        const res = await fetch(`${CONFIG.TUNNEL_URL}/joao/context`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        await res.json(); // context exists — backend is live
      } catch (e) {
        console.warn("Context check failed:", e);
        showError("Backend unavailable — chat may not work.");
      }

      loadingEl.style.display = "none";
      chatEl.style.display = "flex";
      inputArea.style.display = "block";
      userInput.focus();
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const text = userInput.value.trim();
      if (!text) return;

      clearError();
      userInput.value = "";
      sendBtn.disabled = true;

      addMessage("user", text);
      conversationMessages.push({ role: "user", content: text });
      logToTunnel("user", text);

      showThinking();

      try {
        // Send to backend proxy — it handles context, Claude API, and logging
        const res = await fetch(`${CONFIG.RAILWAY_URL}/joao/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages: conversationMessages,
            session_id: "web-" + Date.now(),
          }),
        });

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`Backend error ${res.status}: ${errText}`);
        }

        hideThinking();

        const msgDiv = addMessage("assistant", "");
        let fullResponse = "";

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const payload = line.slice(6);
            if (payload === "[DONE]" || payload === "[ERROR]") continue;
            if (payload.startsWith("[ERROR]")) {
              showError(payload);
              continue;
            }

            fullResponse += payload;
            msgDiv.textContent = fullResponse;
            chatEl.scrollTop = chatEl.scrollHeight;
          }
        }

        conversationMessages.push({ role: "assistant", content: fullResponse });
        if (fullResponse) logToTunnel("assistant", fullResponse);

      } catch (err) {
        hideThinking();
        showError(err.message);
        console.error("Chat error:", err);
      }

      sendBtn.disabled = false;
      userInput.focus();
    }

    chatForm.addEventListener("submit", handleSubmit);

    // Boot
    loadContext();
  </script>

  <!-- LiveKit Client SDK -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>

  <script>
    // ============================================================
    // VOICE — LiveKit WebRTC voice chat
    // ============================================================
    const micBtn = document.getElementById("mic-btn");
    const voiceStatus = document.getElementById("voice-status");

    let voiceRoom = null;
    let voiceState = "idle"; // idle | connecting | active

    function setVoiceState(state) {
      voiceState = state;
      micBtn.classList.remove("connecting", "active");
      voiceStatus.classList.remove("visible");

      if (state === "connecting") {
        micBtn.classList.add("connecting");
      } else if (state === "active") {
        micBtn.classList.add("active");
        voiceStatus.classList.add("visible");
      }
    }

    async function startVoice() {
      setVoiceState("connecting");

      try {
        // 1. Get token from backend
        const tokenRes = await fetch(`${CONFIG.RAILWAY_URL}/joao/voice/token`, {
          method: "POST",
        });
        if (!tokenRes.ok) throw new Error(`Token error: ${tokenRes.status}`);
        const { token, room: roomName, livekit_url } = await tokenRes.json();

        // 2. Connect to LiveKit room
        const room = new LivekitClient.Room({
          adaptiveStream: true,
          dynacast: true,
        });

        room.on(LivekitClient.RoomEvent.Disconnected, () => {
          console.log("Voice disconnected");
          voiceRoom = null;
          setVoiceState("idle");
        });

        room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, publication, participant) => {
          if (track.kind === "audio") {
            const el = track.attach();
            el.id = "agent-audio";
            document.body.appendChild(el);
          }
        });

        room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
          track.detach().forEach((el) => el.remove());
        });

        await room.connect(livekit_url, token);

        // 3. Publish microphone
        await room.localParticipant.setMicrophoneEnabled(true);

        voiceRoom = room;
        setVoiceState("active");
        console.log("Voice connected to room:", roomName);

      } catch (err) {
        console.error("Voice connection failed:", err);
        showError("Voice: " + err.message);
        setVoiceState("idle");
      }
    }

    async function stopVoice() {
      if (voiceRoom) {
        await voiceRoom.disconnect();
        voiceRoom = null;
      }
      // Remove any lingering audio elements
      const agentAudio = document.getElementById("agent-audio");
      if (agentAudio) agentAudio.remove();
      setVoiceState("idle");
    }

    micBtn.addEventListener("click", () => {
      if (voiceState === "idle") {
        startVoice();
      } else if (voiceState === "active") {
        stopVoice();
      }
      // Ignore clicks while connecting
    });
  </script>
</body>
</html>
