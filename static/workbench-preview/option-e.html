<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JOAO · Mind Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/cytoscape-navigator/cytoscape.js-navigator.css">
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/cytoscape-cose-bilkent@4.1.0/cytoscape-cose-bilkent.js"></script>
<script src="https://unpkg.com/cytoscape-navigator/cytoscape-navigator.js"></script>
<style>
:root{--cream:#faf6f0;--ink:#2f2a27;--muted:#6f665f;--line:#dfd3c8;--focus:#f0b429}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:var(--cream);color:var(--ink);font-family:"Atkinson Hyperlegible",system-ui,sans-serif;line-height:1.62;letter-spacing:.02em;font-size:16px}
button,input{font:inherit}button,input,.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:.45rem .8rem;color:var(--ink)}
button:focus-visible,input:focus-visible,.chip:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
header{padding:14px 18px 6px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap}
h1{margin:0;font:600 italic clamp(34px,4vw,56px)/.95 "Cormorant Garamond",serif;color:#d28d11}header p{margin:.2rem 0 0;color:var(--muted)}
.badge{background:#fff1ce;border:1px solid #f0b429;color:#9f6500;padding:.2rem .6rem;border-radius:999px;font-size:.8rem}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.chips{padding:8px 18px 10px;display:flex;gap:8px;flex-wrap:wrap}
.chip[aria-pressed="true"]{background:#ffefcc;border-color:#f0b429}
.layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,40vw);height:calc(100% - 130px)}
#graph-wrap{position:relative;padding:0 18px 18px}#cy{width:100%;height:100%;min-height:580px;border:1px solid var(--line);border-radius:16px;background:#fff}
#drawer{border-left:1px solid var(--line);background:#fffdf9;padding:14px;overflow:auto}#drawer[hidden]{display:none}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin:.5rem 0}.tag{background:#f6ebe1;border:1px solid #e6d4c4;border-radius:999px;padding:.15rem .55rem;font-size:.8rem;color:#6d5646}
.related{margin:.6rem 0 0;padding:0;list-style:none}.related li{padding:.35rem .45rem;border:1px solid #eadccf;border-radius:8px;margin:.35rem 0;background:#fff}
.cta{display:block;width:100%;margin-top:12px;padding:.7rem 1rem;border-radius:12px;border:1px solid #efaf30;background:#ffd474;color:#4a2e00;font-weight:700}
.palette{position:fixed;inset:0;background:rgba(90,70,54,.2);display:none;place-items:start center;padding-top:8vh;z-index:20}.palette.open{display:grid}
.palette-card{width:min(720px,92vw);background:#fff;padding:12px;border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.12)}
.palette-results{display:grid;gap:6px;max-height:48vh;overflow:auto;margin-top:8px}
.res{display:flex;justify-content:space-between;align-items:center;border-radius:8px;padding:.45rem .6rem;border:1px solid #eee3d9;background:#fff;text-align:left}
.res small{color:var(--muted)}#mini{position:absolute;right:30px;bottom:30px;z-index:8}
@media (max-width:980px){.layout{grid-template-columns:1fr}#drawer{position:fixed;inset:auto 0 0 0;max-height:62vh;border-top:1px solid var(--line);z-index:15}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <div><h1>JOAO · Mind Graph</h1><p>neurodivergent-first · colorful · yours</p></div>
  <div class="controls"><span class="badge">✨ NEURODIVERGENT PICK</span><button id="zoomIn" aria-label="Zoom in">+</button><button id="zoomOut" aria-label="Zoom out">−</button><button id="fit" aria-label="Fit graph">Fit</button><button id="reset" aria-label="Reset filter">All</button><button id="cmd" aria-label="Open command palette">⌘K Search</button></div>
</header>
<nav class="chips" id="chips" aria-label="Type filters"></nav>
<main class="layout"><section id="graph-wrap"><div id="cy" role="application" aria-label="Mind graph"></div><div id="mini"></div></section><aside id="drawer" hidden aria-live="polite"></aside></main>
<div class="palette" id="palette" aria-hidden="true"><div class="palette-card"><label for="search">Find node</label><input id="search" placeholder="Type a node title..." autocomplete="off"><div class="palette-results" id="results"></div></div></div>
<script>
const TYPE_COLORS={Idea:'#ff6b6b',Project:'#ffd93d',Decision:'#6bcf7f',Reference:'#c39bd3',Person:'#4ecdc4',Tool:'#e88e6a',Question:'#ff5e9f',Quote:'#a8e6cf'};
const REL_COL={RELATES_TO:'#b8b5b0',TRIGGERED:'#ff9f43',CONTRADICTS:'#e63946',PART_OF:'#845ec2',DEPENDS_ON:'#4d96ff',MENTIONS:'#c2b6ac',EVOLVED_INTO:'#8a8a8a',DUPLICATES:'#a68b7d',ANSWERS:'#5da26f',AUTHORED_BY:'#6c9f95'};
const reduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const posKey='mind_graph_layout_v1';
const drawer=document.getElementById('drawer'),chips=document.getElementById('chips'),palette=document.getElementById('palette'),search=document.getElementById('search'),results=document.getElementById('results');
let cy,raw;
function mkChips(types){const all=['All types',...types];chips.innerHTML='';all.forEach((t,i)=>{const b=document.createElement('button');b.className='chip';b.textContent=t;b.setAttribute('aria-pressed',i===0?'true':'false');b.dataset.type=i===0?'all':t;b.onclick=()=>applyFilter(b.dataset.type,b);chips.appendChild(b);});}
function applyFilter(type,btn){[...chips.children].forEach(c=>c.setAttribute('aria-pressed',String(c===btn)));if(type==='all'){cy.elements().style('display','element');cy.fit(undefined,40);return;}cy.batch(()=>{cy.nodes().forEach(n=>n.style('display',n.data('type')===type?'element':'none'));cy.edges().forEach(e=>{const ok=e.source().style('display')!=='none'&&e.target().style('display')!=='none';e.style('display',ok?'element':'none');});});cy.fit(cy.nodes(`[type = "${type}"]`),40);}
function score(term,title){const t=term.toLowerCase().trim();if(!t)return 0;const s=title.toLowerCase();if(s===t)return 100;if(s.startsWith(t))return 70;if(s.includes(t))return 50;let i=0,m=0;for(const ch of t){i=s.indexOf(ch,i);if(i<0)return 0;i++;m++;}return m*3;}
function openPalette(){palette.classList.add('open');palette.setAttribute('aria-hidden','false');search.value='';paintResults('');search.focus();}
function closePalette(){palette.classList.remove('open');palette.setAttribute('aria-hidden','true');}
function focusNode(id){const n=cy.getElementById(id);if(!n||!n.length)return;cy.animate({center:{eles:n},zoom:Math.min(1.4,cy.maxZoom())},{duration:reduced?0:280});openDrawer(n);n.select();}
function paintResults(term){const rows=raw.nodes.map(n=>({n,sc:score(term,n.title)})).filter(r=>r.sc>0||!term).sort((a,b)=>b.sc-a.sc).slice(0,14);results.innerHTML='';rows.forEach(({n})=>{const b=document.createElement('button');b.className='res';b.innerHTML=`<span>${n.title}</span><small>${n.type}</small>`;b.onclick=()=>{focusNode(n.id);closePalette();};results.appendChild(b);});}
function openDrawer(node){const d=node.data();const rel=node.connectedEdges().map(e=>{const other=e.source().id()===node.id()?e.target():e.source();return {id:other.id(),title:other.data('label'),rel:e.data('relation')};}).slice(0,20);drawer.hidden=false;drawer.innerHTML=`<h2 style="margin:.2rem 0">${d.label}</h2><p style="margin:.2rem 0;color:#6f665f">${d.type}</p><p>${d.body||'No body yet.'}</p><div class="tags">${(d.tags||[]).map(t=>`<span class=tag>#${t}</span>`).join('')}</div><h3 style="margin:.7rem 0 .3rem">Related Nodes</h3><ul class=related>${rel.map(r=>`<li><button class="res" data-id="${r.id}"><span>${r.title}</span><small>${r.rel}</small></button></li>`).join('')||'<li>No links yet</li>'}</ul><button class=cta id="chatNode">Chat with this node</button>`;
  drawer.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>focusNode(b.dataset.id));
  document.getElementById('chatNode').onclick=()=>{openPalette();search.value=d.label;paintResults(d.label);};
}
function savePos(){const map={};cy.nodes().forEach(n=>{map[n.id()]=n.position();});localStorage.setItem(posKey,JSON.stringify(map));}
function loadPos(){try{return JSON.parse(localStorage.getItem(posKey)||'{}');}catch{return {};}}
async function boot(){const t0=performance.now();const res=await fetch('/static/workbench-preview/seed-graph.json',{cache:'no-store'});raw=await res.json();const types=[...new Set(raw.nodes.map(n=>n.type))];mkChips(types);
const elements=[...raw.nodes.map(n=>({data:{id:n.id,label:n.title,type:n.type,body:n.body,tags:n.tags,importance:n.importance||4}})),...raw.edges.map(e=>({data:{id:e.id,source:e.source,target:e.target,relation:e.relation}}))];
const styles=[{selector:'node',style:{'label':'data(label)','font-size':'12px','text-wrap':'wrap','text-max-width':'110px','text-valign':'center','text-halign':'center','background-color':'#ddd','border-width':2,'border-color':'#fff','color':'#2f2a27','width':'mapData(importance,1,10,28,76)','height':'mapData(importance,1,10,28,76)'}},{selector:'edge',style:{'curve-style':'bezier','width':2,'line-color':'#b8b5b0','target-arrow-shape':'triangle','target-arrow-color':'#b8b5b0','arrow-scale':.8,'label':'','font-size':'10px','color':'#6f665f','text-background-color':'#fff','text-background-opacity':.8,'text-background-padding':'2px','text-opacity':0}},{selector:'edge.label-on',style:{'label':'data(relation)','text-opacity':1,'width':3}},{selector:'node.cluster',style:{'border-color':'#f0b429','border-width':4}},{selector:'edge.cluster',style:{'width':3}}];
Object.entries(TYPE_COLORS).forEach(([t,c])=>styles.push({selector:`node[type = "${t}"]`,style:{'background-color':c}}));
Object.entries(REL_COL).forEach(([r,c])=>styles.push({selector:`edge[relation = "${r}"]`,style:{'line-color':c,'target-arrow-color':c}}));
cy=cytoscape({container:document.getElementById('cy'),elements,style:styles,minZoom:.2,maxZoom:2.5,wheelSensitivity:.18});
const saved=loadPos();if(Object.keys(saved).length>40){cy.nodes().forEach(n=>{if(saved[n.id()])n.position(saved[n.id()]);});cy.fit(undefined,40);}else{const layout=cy.layout({name:'cose-bilkent',animate:!reduced,animationDuration:reduced?0:500,fit:true,padding:40,nodeRepulsion:6500,idealEdgeLength:120,edgeElasticity:.12});layout.run();cy.once('layoutstop',savePos);}cy.on('dragfree','node',savePos);
cy.on('mouseover','node',ev=>{cy.elements().removeClass('cluster label-on');const hood=ev.target.closedNeighborhood();hood.nodes().addClass('cluster');hood.edges().addClass('cluster label-on');if(!reduced){hood.nodes().animate({style:{'border-width':6}},{duration:360}).animate({style:{'border-width':4}},{duration:520});}});
cy.on('mouseout','node',()=>cy.elements().removeClass('cluster label-on'));cy.on('tap','node',ev=>openDrawer(ev.target));
document.getElementById('zoomIn').onclick=()=>cy.zoom({level:cy.zoom()*1.15,renderedPosition:{x:cy.width()/2,y:cy.height()/2}});
document.getElementById('zoomOut').onclick=()=>cy.zoom({level:cy.zoom()/1.15,renderedPosition:{x:cy.width()/2,y:cy.height()/2}});
document.getElementById('fit').onclick=()=>cy.fit(undefined,40);
document.getElementById('reset').onclick=()=>{const b=[...chips.children].find(c=>c.dataset.type==='all');if(b)applyFilter('all',b);};
document.getElementById('cmd').onclick=openPalette;
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openPalette();}if(e.key==='Escape')closePalette();if((e.metaKey||e.ctrlKey)&&e.key==='/'){e.preventDefault();openPalette();}});
palette.addEventListener('click',e=>{if(e.target===palette)closePalette();});search.addEventListener('input',()=>paintResults(search.value));search.addEventListener('keydown',e=>{if(e.key==='Enter'){const first=results.querySelector('button');if(first)first.click();}});paintResults('');if(cy.navigator){cy.navigator({container:'#mini',viewLiveFramerate:0});}
console.log('mind-graph boot ms',Math.round(performance.now()-t0));}
boot();
</script>
</body>
</html>
