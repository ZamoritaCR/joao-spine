<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MrDP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080f;
  --surface:#0c1018;
  --border:#1a1f2e;
  --cyan:#00e5ff;
  --gold:#ffd700;
  --text:#c8d0e0;
  --text-dim:#667;
  --font-head:'Syne',sans-serif;
  --font-body:'IBM Plex Mono',monospace;
}
html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:14px;
  line-height:1.6;
  overflow:hidden;
}
#app{
  display:flex;
  flex-direction:column;
  height:100dvh;
  max-width:720px;
  margin:0 auto;
  padding:16px;
}

/* Header */
header{
  text-align:center;
  padding:12px 0;
  flex-shrink:0;
}
header h1{
  font-family:var(--font-head);
  font-size:32px;
  font-weight:700;
  color:var(--cyan);
  letter-spacing:2px;
}
header p{
  font-size:11px;
  color:var(--text-dim);
  margin-top:4px;
  letter-spacing:0.5px;
}

/* Feel-first */
#feel-first{
  flex-shrink:0;
  text-align:center;
  padding:24px 0;
}
#feel-first h2{
  font-family:var(--font-head);
  font-size:18px;
  color:var(--text);
  margin-bottom:20px;
  font-weight:400;
}
.states{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}
.state-btn{
  font-family:var(--font-body);
  font-size:13px;
  padding:12px 20px;
  background:var(--surface);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:6px;
  cursor:pointer;
  transition:all 0.2s;
  min-width:120px;
  min-height:44px;
}
.state-btn:hover,.state-btn:focus{
  border-color:var(--cyan);
  color:var(--cyan);
  outline:none;
}
.state-btn:active{
  background:rgba(0,229,255,0.08);
}

/* Chat area */
#chat-area{
  flex:1;
  display:none;
  flex-direction:column;
  overflow:hidden;
}
#chat-area.active{
  display:flex;
}
#messages{
  flex:1;
  overflow-y:auto;
  padding:8px 0;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.msg{
  margin-bottom:12px;
  padding:10px 14px;
  border-radius:8px;
  font-size:13px;
  line-height:1.6;
  max-width:85%;
  white-space:pre-wrap;
  word-wrap:break-word;
}
.msg.user{
  background:rgba(0,229,255,0.08);
  border:1px solid rgba(0,229,255,0.15);
  color:var(--text);
  margin-left:auto;
  text-align:right;
}
.msg.assistant{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
}
.msg.assistant .thinking{
  color:var(--text-dim);
  font-style:italic;
}

/* Input area */
#input-area{
  flex-shrink:0;
  display:flex;
  gap:8px;
  padding:12px 0 4px;
  align-items:flex-end;
}
#input-area textarea{
  flex:1;
  font-family:var(--font-body);
  font-size:13px;
  padding:10px 14px;
  background:var(--surface);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:6px;
  resize:none;
  line-height:1.5;
  max-height:120px;
  min-height:44px;
}
#input-area textarea:focus{
  outline:none;
  border-color:var(--cyan);
}
#input-area textarea::placeholder{
  color:var(--text-dim);
}
#send-btn{
  font-family:var(--font-head);
  font-size:12px;
  padding:10px 20px;
  min-height:44px;
  min-width:44px;
  background:transparent;
  color:var(--cyan);
  border:1px solid var(--cyan);
  border-radius:6px;
  cursor:pointer;
  letter-spacing:1px;
  font-weight:600;
  transition:all 0.2s;
}
#send-btn:hover{
  background:rgba(0,229,255,0.1);
}
#send-btn:disabled{
  opacity:0.3;
  cursor:not-allowed;
}

/* New conversation button */
#new-btn{
  position:fixed;
  top:16px;
  right:16px;
  font-family:var(--font-body);
  font-size:11px;
  padding:6px 12px;
  background:transparent;
  color:var(--text-dim);
  border:1px solid var(--border);
  border-radius:4px;
  cursor:pointer;
  z-index:10;
}
#new-btn:hover{
  color:var(--gold);
  border-color:var(--gold);
}

@media(max-width:480px){
  #app{padding:10px}
  header h1{font-size:26px}
  .state-btn{min-width:100px;padding:10px 14px;font-size:12px}
  .msg{max-width:92%;font-size:12px}
}
</style>
</head>
<body>
<div id="app">
  <button id="new-btn" onclick="resetChat()" style="display:none">NEW</button>
  <header>
    <h1>MrDP</h1>
    <p>Built from neuroscience. For neurodivergent minds.</p>
  </header>

  <div id="feel-first">
    <h2>How are you feeling right now?</h2>
    <div class="states">
      <button class="state-btn" onclick="startChat('Overwhelmed')">Overwhelmed</button>
      <button class="state-btn" onclick="startChat('Scattered')">Scattered</button>
      <button class="state-btn" onclick="startChat('Flat')">Flat</button>
      <button class="state-btn" onclick="startChat('Anxious')">Anxious</button>
      <button class="state-btn" onclick="startChat('Focused')">Focused</button>
      <button class="state-btn" onclick="startChat('Good')">Good</button>
    </div>
  </div>

  <div id="chat-area">
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="user-input" rows="1" placeholder="Say something..." onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">SEND</button>
    </div>
  </div>
</div>

<script>
var messages = [];
var streaming = false;

function startChat(feeling) {
  document.getElementById('feel-first').style.display = 'none';
  document.getElementById('chat-area').classList.add('active');
  document.getElementById('new-btn').style.display = 'block';
  document.getElementById('user-input').focus();

  var text = 'I am feeling ' + feeling.toLowerCase();
  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  callMrDP();
}

function sendMessage() {
  if (streaming) return;
  var input = document.getElementById('user-input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  callMrDP();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  // Auto-resize textarea
  setTimeout(function() {
    var el = e.target;
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }, 0);
}

function addMessage(role, text) {
  var container = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

var sessionId = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : 'mrdp-' + Date.now();

function callMrDP() {
  streaming = true;
  document.getElementById('send-btn').disabled = true;
  var msgDiv = addMessage('assistant', '');
  var fullText = '';

  fetch('/joao/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: messages,
      mode: 'mrdp',
      session_id: sessionId
    })
  }).then(function(resp) {
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    function readChunk() {
      return reader.read().then(function(result) {
        if (result.done) {
          finishStream();
          return;
        }
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop();

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (!line.startsWith('data: ')) continue;
          var payload = line.slice(6);

          if (payload === '[DONE]') {
            finishStream();
            return;
          }
          if (payload.startsWith('[ERROR]') || payload.startsWith('[Executing') || payload.startsWith('[Tools')) {
            continue;
          }
          try {
            var text = JSON.parse(payload);
            if (typeof text === 'string') {
              fullText += text;
              msgDiv.textContent = fullText;
              document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
          } catch(e) {}
        }
        return readChunk();
      });
    }

    function finishStream() {
      if (fullText) {
        messages.push({ role: 'assistant', content: fullText });
      }
      streaming = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('user-input').focus();
    }

    return readChunk();
  }).catch(function(err) {
    msgDiv.textContent = 'Connection error. Try again.';
    msgDiv.style.color = '#c97b7b';
    streaming = false;
    document.getElementById('send-btn').disabled = false;
  });
}

function resetChat() {
  messages = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('chat-area').classList.remove('active');
  document.getElementById('feel-first').style.display = '';
  document.getElementById('new-btn').style.display = 'none';
}
</script>
</body>
</html>
