<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00ff88">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>JOAO Command</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/static/icon-192.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#141414;--border:#222;--accent:#00ff88;--accent-dim:#00cc6a;--text:#e0e0e0;--text-dim:#888;--red:#ff4444;--yellow:#ffaa00}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

/* Header */
.header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header h1{font-size:18px;font-weight:700;letter-spacing:1px}
.header h1 span{color:var(--accent)}
.settings-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer}

/* Agent Strip */
.agents{padding:12px 20px;display:flex;gap:10px;overflow-x:auto;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch}
.agent{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface);border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap}
.agent .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.online{background:var(--accent)}
.dot.offline{background:var(--red)}
.dot.unknown{background:var(--yellow)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:24px}

/* Status */
.status-text{font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);transition:color .3s}
.status-text.listening{color:var(--accent)}
.status-text.processing{color:var(--yellow)}
.status-text.dispatched{color:var(--accent)}
.status-text.error{color:var(--red)}

/* Mic Button */
.mic-wrap{position:relative;width:120px;height:120px}
.mic-ring{position:absolute;inset:-10px;border-radius:50%;border:2px solid var(--accent);opacity:0;animation:none}
.mic-ring.pulse{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%{transform:scale(1);opacity:.6}50%{transform:scale(1.2);opacity:0}100%{transform:scale(1);opacity:0}}
.mic-btn{width:120px;height:120px;border-radius:50%;border:3px solid var(--accent);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative;z-index:1;-webkit-tap-highlight-color:transparent}
.mic-btn:active{transform:scale(.95)}
.mic-btn.recording{background:var(--accent);border-color:var(--accent)}
.mic-btn.recording svg{fill:var(--bg)}
.mic-btn svg{width:48px;height:48px;fill:var(--accent);transition:fill .2s}
.mic-btn.disabled{opacity:.4;pointer-events:none}

/* Transcript */
.transcript{font-size:16px;text-align:center;max-width:320px;min-height:24px;color:var(--text-dim);font-style:italic}

/* Result Card */
.result-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;display:none}
.result-card.visible{display:block}
.result-card .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:4px}
.result-card .value{font-size:15px;margin-bottom:12px}
.result-card .value.agent{color:var(--accent);font-weight:700;font-size:18px}
.result-card .meta{font-size:12px;color:var(--text-dim)}

/* History */
.history{padding:16px 20px;border-top:1px solid var(--border)}
.history h3{font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px}
.history-item .hi-agent{color:var(--accent);font-weight:600}
.history-item .hi-time{color:var(--text-dim);font-size:11px;float:right}

/* Settings Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.visible{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:340px}
.modal h2{font-size:16px;margin-bottom:16px}
.modal label{font-size:13px;color:var(--text-dim);display:block;margin-bottom:4px}
.modal input{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:16px}
.modal .btn{width:100%;padding:10px;background:var(--accent);color:var(--bg);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <h1><span>J</span>OAO</h1>
  <button class="settings-btn" id="settingsBtn">API Key</button>
</div>

<div class="agents" id="agentStrip">
  <div class="agent"><span class="dot unknown"></span>Loading...</div>
</div>

<div class="main">
  <div class="status-text" id="statusText">READY</div>

  <div class="mic-wrap">
    <div class="mic-ring" id="micRing"></div>
    <button class="mic-btn" id="micBtn">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
  </div>

  <div class="transcript" id="transcript"></div>

  <div class="result-card" id="resultCard">
    <div class="label">Agent</div>
    <div class="value agent" id="resAgent">—</div>
    <div class="label">Task</div>
    <div class="value" id="resTask">—</div>
    <div class="label">Status</div>
    <div class="value" id="resStatus">—</div>
    <div class="meta" id="resMeta"></div>
  </div>
</div>

<div class="history">
  <h3>Recent Commands</h3>
  <div class="history-list" id="historyList">
    <div class="history-item" style="color:var(--text-dim)">No commands yet</div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>API Key</h2>
    <label for="apiKeyInput">X-JOAO-API-KEY</label>
    <input type="password" id="apiKeyInput" placeholder="Paste your API key">
    <button class="btn" id="saveKeyBtn">Save</button>
  </div>
</div>

<script>
const API_BASE = '';
const AGENTS = ['BYTE','ARIA','CJ','SOFIA','DEX','GEMMA','MAX'];

// State
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let history = JSON.parse(localStorage.getItem('joao_history') || '[]');

// DOM
const micBtn = document.getElementById('micBtn');
const micRing = document.getElementById('micRing');
const statusText = document.getElementById('statusText');
const transcript = document.getElementById('transcript');
const resultCard = document.getElementById('resultCard');
const resAgent = document.getElementById('resAgent');
const resTask = document.getElementById('resTask');
const resStatus = document.getElementById('resStatus');
const resMeta = document.getElementById('resMeta');
const historyList = document.getElementById('historyList');
const agentStrip = document.getElementById('agentStrip');
const modal = document.getElementById('modal');
const settingsBtn = document.getElementById('settingsBtn');
const saveKeyBtn = document.getElementById('saveKeyBtn');
const apiKeyInput = document.getElementById('apiKeyInput');

function getApiKey() { return localStorage.getItem('joao_api_key') || ''; }

function setStatus(s) {
  statusText.textContent = s.toUpperCase();
  statusText.className = 'status-text ' + s.toLowerCase();
}

// Agent status
async function loadAgents() {
  try {
    const resp = await fetch(API_BASE + '/joao/status');
    const data = await resp.json();
    const sessions = data.checks?.tmux?.sessions || [];
    agentStrip.innerHTML = AGENTS.map(a => {
      const online = sessions.includes(a);
      return `<div class="agent"><span class="dot ${online ? 'online' : 'offline'}"></span>${a}</div>`;
    }).join('');
  } catch {
    agentStrip.innerHTML = AGENTS.map(a =>
      `<div class="agent"><span class="dot unknown"></span>${a}</div>`
    ).join('');
  }
}

// History
function renderHistory() {
  if (!history.length) {
    historyList.innerHTML = '<div class="history-item" style="color:var(--text-dim)">No commands yet</div>';
    return;
  }
  historyList.innerHTML = history.slice(0, 5).map(h =>
    `<div class="history-item">
      <span class="hi-time">${new Date(h.ts).toLocaleTimeString()}</span>
      <span class="hi-agent">${h.agent || h.intent}</span> ${h.task || h.transcript?.slice(0,40) || ''}
    </div>`
  ).join('');
}

function addHistory(entry) {
  history.unshift(entry);
  if (history.length > 20) history = history.slice(0, 20);
  localStorage.setItem('joao_history', JSON.stringify(history));
  renderHistory();
}

// Mic recording
micBtn.addEventListener('click', async () => {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
});

async function startRecording() {
  const key = getApiKey();
  if (!key) {
    modal.classList.add('visible');
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      await processAudio(blob);
    };

    mediaRecorder.start();
    isRecording = true;
    micBtn.classList.add('recording');
    micRing.classList.add('pulse');
    setStatus('listening');
    transcript.textContent = '';
    resultCard.classList.remove('visible');
  } catch (err) {
    setStatus('error');
    transcript.textContent = 'Microphone access denied';
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  micBtn.classList.remove('recording');
  micRing.classList.remove('pulse');
  setStatus('processing');
}

async function processAudio(blob) {
  const key = getApiKey();
  const formData = new FormData();
  formData.append('audio', blob, 'audio.webm');

  try {
    const resp = await fetch(API_BASE + '/joao/voice/command', {
      method: 'POST',
      headers: { 'X-JOAO-API-KEY': key },
      body: formData,
    });

    if (resp.status === 401) {
      setStatus('error');
      transcript.textContent = 'Invalid API key';
      modal.classList.add('visible');
      return;
    }

    if (!resp.ok) {
      setStatus('error');
      transcript.textContent = 'Server error: ' + resp.status;
      return;
    }

    const data = await resp.json();
    transcript.textContent = '"' + data.transcript + '"';

    // Show result
    const intent = data.intent || {};
    const result = data.result || {};

    if (intent.intent === 'dispatch') {
      resAgent.textContent = result.agent || intent.agent || '—';
      resTask.textContent = result.task || intent.task || '—';
      resStatus.textContent = result.status || '—';
      resMeta.textContent = intent.priority !== 'normal' ? 'Priority: ' + intent.priority : '';
      setStatus('dispatched');
    } else if (intent.intent === 'status') {
      const agents = result.agents || {};
      resAgent.textContent = 'COUNCIL';
      resTask.textContent = Object.entries(agents).map(([a, on]) => `${a}: ${on ? 'ONLINE' : 'OFFLINE'}`).join(', ');
      resStatus.textContent = result.status || '—';
      resMeta.textContent = (result.sessions || []).length + ' active sessions';
      setStatus('dispatched');
      loadAgents();
    } else if (intent.intent === 'check') {
      resAgent.textContent = result.agent || intent.agent || '—';
      resTask.textContent = (result.output || '').slice(0, 200) || 'No output';
      resStatus.textContent = result.status || '—';
      resMeta.textContent = '';
      setStatus('dispatched');
    } else if (intent.intent === 'idea') {
      resAgent.textContent = 'IDEA VAULT';
      resTask.textContent = result.title || intent.task || '—';
      resStatus.textContent = result.status || '—';
      resMeta.textContent = result.idea_id ? 'ID: ' + result.idea_id : '';
      setStatus('dispatched');
    } else {
      resAgent.textContent = '—';
      resTask.textContent = result.response || 'Unknown command';
      resStatus.textContent = 'unknown';
      resMeta.textContent = '';
      setStatus('ready');
    }

    resultCard.classList.add('visible');
    addHistory({
      ts: Date.now(),
      intent: intent.intent,
      agent: intent.agent,
      task: intent.task,
      transcript: data.transcript,
      status: result.status,
    });

  } catch (err) {
    setStatus('error');
    transcript.textContent = 'Connection failed';
  }
}

// Settings
settingsBtn.addEventListener('click', () => {
  apiKeyInput.value = getApiKey();
  modal.classList.add('visible');
});
saveKeyBtn.addEventListener('click', () => {
  localStorage.setItem('joao_api_key', apiKeyInput.value.trim());
  modal.classList.remove('visible');
});
modal.addEventListener('click', (e) => {
  if (e.target === modal) modal.classList.remove('visible');
});

// Init
renderHistory();
loadAgents();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(() => {});
}
</script>
</body>
</html>
