<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOAO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --bg-1: #111118;
  --bg-2: #18181f;
  --bg-3: #1e1e28;
  --border: #2a2a35;
  --border-light: #35354a;
  --text: #d0d0dc;
  --text-dim: #6a6a80;
  --text-bright: #eaeaf0;
  --accent: #6c8aff;
  --accent-dim: rgba(108, 138, 255, 0.12);
  --green: #3ddc84;
  --green-dim: rgba(61, 220, 132, 0.12);
  --orange: #ffaa44;
  --orange-dim: rgba(255, 170, 68, 0.10);
  --red: #ff5566;
  --sidebar-w: 260px;
  --artifact-w: 0px;
  --topbar-h: 44px;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ================================================================ */
/*  LAYOUT                                                           */
/* ================================================================ */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr var(--artifact-w);
  grid-template-rows: var(--topbar-h) 1fr auto;
  height: 100vh;
  transition: grid-template-columns 0.3s ease;
}
.app.sidebar-collapsed { --sidebar-w: 0px; }
.app.artifact-open { --artifact-w: 440px; }

/* ================================================================ */
/*  SIDEBAR                                                          */
/* ================================================================ */
.sidebar {
  grid-row: 1 / -1;
  grid-column: 1;
  background: var(--bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.3s ease, opacity 0.2s ease;
  min-width: 0;
}
.app.sidebar-collapsed .sidebar { width: 0; opacity: 0; pointer-events: none; }

.sidebar-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.sidebar-brand {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--text-dim);
}
.new-chat-btn {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.new-chat-btn:hover { background: var(--bg-3); border-color: var(--border-light); }

.conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.conv-list::-webkit-scrollbar { width: 3px; }
.conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.conv-item {
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}
.conv-item:hover { background: var(--bg-2); color: var(--text); }
.conv-item.active { background: var(--bg-3); color: var(--text-bright); }

.conv-item-actions {
  display: none;
  float: right;
}
.conv-item:hover .conv-item-actions { display: inline; }
.conv-delete {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 11px; padding: 2px 4px; border-radius: 3px;
}
.conv-delete:hover { color: var(--red); background: rgba(255,85,102,0.1); }

/* ================================================================ */
/*  TOP BAR                                                          */
/* ================================================================ */
.topbar {
  grid-column: 2 / -1;
  grid-row: 1;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  min-width: 0;
}
.toggle-sidebar-btn {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 16px; padding: 4px;
  line-height: 1; transition: color 0.15s;
}
.toggle-sidebar-btn:hover { color: var(--text); }

.topbar-model {
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 3px 10px;
  border-radius: 4px;
  letter-spacing: 0.03em;
}
.topbar-session {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  background: none;
  border: none;
  outline: none;
  font-family: inherit;
  min-width: 0;
}
.topbar-session::placeholder { color: var(--text-dim); }
.topbar-tokens {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
}

/* ================================================================ */
/*  CHAT AREA                                                        */
/* ================================================================ */
.chat-area {
  grid-column: 2;
  grid-row: 2;
  overflow-y: auto;
  padding: 24px 0;
  display: flex;
  flex-direction: column;
  scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg-row {
  display: flex;
  padding: 0 24px;
  max-width: 820px;
  width: 100%;
  margin: 0 auto;
}
.msg-row + .msg-row { margin-top: 4px; }
.msg-row.user { justify-content: flex-end; }

.msg-bubble {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.65;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.msg-bubble.user {
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text-bright);
  border-bottom-right-radius: 4px;
}
.msg-bubble.assistant {
  background: transparent;
  color: var(--text);
  padding-left: 0;
}

/* Markdown rendering */
.msg-bubble.assistant p { margin-bottom: 10px; }
.msg-bubble.assistant p:last-child { margin-bottom: 0; }
.msg-bubble.assistant strong { color: var(--text-bright); font-weight: 600; }
.msg-bubble.assistant em { font-style: italic; color: var(--text); }
.msg-bubble.assistant code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  padding: 1px 5px;
  border-radius: 4px;
  color: var(--accent);
}
.msg-bubble.assistant pre {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 10px 0;
  position: relative;
}
.msg-bubble.assistant pre code {
  background: none;
  border: none;
  padding: 0;
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--text);
}
.msg-bubble.assistant ul, .msg-bubble.assistant ol {
  margin: 8px 0;
  padding-left: 20px;
}
.msg-bubble.assistant li { margin-bottom: 4px; }
.msg-bubble.assistant h1, .msg-bubble.assistant h2, .msg-bubble.assistant h3 {
  color: var(--text-bright);
  margin: 16px 0 8px;
  font-weight: 600;
}
.msg-bubble.assistant h1 { font-size: 18px; }
.msg-bubble.assistant h2 { font-size: 16px; }
.msg-bubble.assistant h3 { font-size: 14px; }
.msg-bubble.assistant blockquote {
  border-left: 3px solid var(--border-light);
  padding-left: 12px;
  color: var(--text-dim);
  margin: 8px 0;
}
.msg-bubble.assistant a {
  color: var(--accent);
  text-decoration: none;
}
.msg-bubble.assistant a:hover { text-decoration: underline; }

/* Code copy button */
.code-block-wrap { position: relative; }
.code-copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  font-size: 11px;
  padding: 3px 8px;
  cursor: pointer;
  font-family: inherit;
  opacity: 0;
  transition: opacity 0.15s;
}
.code-block-wrap:hover .code-copy-btn { opacity: 1; }
.code-copy-btn:hover { color: var(--text); background: var(--border); }

/* ================================================================ */
/*  THINKING INDICATOR                                               */
/* ================================================================ */
.thinking-row {
  display: flex;
  padding: 0 24px;
  max-width: 820px;
  width: 100%;
  margin: 8px auto 0;
}
.thinking-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-dim);
}
.thinking-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; transform: scale(0.85); }
  50% { opacity: 1; transform: scale(1.1); }
}

/* ================================================================ */
/*  TOOL CALL CARDS                                                  */
/* ================================================================ */
.tool-card {
  max-width: 820px;
  width: 100%;
  margin: 6px auto;
  padding: 0 24px;
}
.tool-card-inner {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.tool-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}
.tool-card-header:hover { background: var(--bg-2); }
.tool-icon {
  width: 24px; height: 24px;
  border-radius: 6px;
  background: var(--orange-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--orange); flex-shrink: 0;
}
.tool-icon.done { background: var(--green-dim); color: var(--green); }
.tool-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  min-width: 0;
}
.tool-duration {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
}
.tool-chevron {
  font-size: 11px;
  color: var(--text-dim);
  transition: transform 0.2s;
}
.tool-card-inner.expanded .tool-chevron { transform: rotate(90deg); }
.tool-card-body {
  display: none;
  padding: 0 14px 12px;
  border-top: 1px solid var(--border);
}
.tool-card-inner.expanded .tool-card-body { display: block; }
.tool-params, .tool-result {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--text-dim);
  max-height: 200px;
  overflow-y: auto;
  margin-top: 8px;
}
.tool-section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-top: 10px;
  text-transform: uppercase;
}
.tool-result-summary {
  font-size: 12px;
  color: var(--text);
  padding: 4px 0 0;
}

/* ================================================================ */
/*  INPUT AREA                                                       */
/* ================================================================ */
.input-area {
  grid-column: 2;
  grid-row: 3;
  padding: 12px 24px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.input-wrap {
  max-width: 820px;
  margin: 0 auto;
  position: relative;
}
.input-textarea {
  width: 100%;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 52px 12px 16px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--text-bright);
  outline: none;
  resize: none;
  min-height: 44px;
  max-height: 200px;
  line-height: 1.5;
  transition: border-color 0.15s;
}
.input-textarea:focus { border-color: var(--border-light); }
.input-textarea::placeholder { color: var(--text-dim); }
.send-btn {
  position: absolute;
  right: 8px;
  bottom: 8px;
  width: 32px; height: 32px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s, background 0.15s;
  font-size: 14px;
}
.send-btn:disabled { opacity: 0.3; cursor: default; }
.send-btn:hover:not(:disabled) { background: #5a78ee; }

/* ================================================================ */
/*  ARTIFACT PANEL                                                   */
/* ================================================================ */
.artifact-panel {
  grid-column: 3;
  grid-row: 1 / -1;
  background: var(--bg);
  border-left: 1px solid var(--border);
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.app.artifact-open .artifact-panel { display: flex; }

.artifact-header {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
}
.artifact-tabs {
  display: flex;
  gap: 4px;
  flex: 1;
  overflow-x: auto;
  min-width: 0;
}
.artifact-tab {
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  background: none;
  border: 1px solid transparent;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
  transition: all 0.12s;
}
.artifact-tab:hover { color: var(--text); background: var(--bg-2); }
.artifact-tab.active { color: var(--text-bright); background: var(--bg-3); border-color: var(--border); }

.artifact-close-btn, .artifact-fullscreen-btn {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 14px; padding: 4px;
  transition: color 0.12s;
}
.artifact-close-btn:hover, .artifact-fullscreen-btn:hover { color: var(--text); }

.artifact-body {
  flex: 1;
  overflow: auto;
  position: relative;
}
.artifact-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  line-height: 1.55;
  padding: 16px;
  white-space: pre;
  color: var(--text);
  min-height: 100%;
}
.artifact-copy-btn {
  position: absolute;
  top: 10px; right: 10px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text-dim);
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  font-family: inherit;
  z-index: 2;
}
.artifact-copy-btn:hover { color: var(--text); background: var(--border); }

/* Fullscreen artifact */
.artifact-panel.fullscreen {
  position: fixed;
  inset: 0;
  z-index: 500;
  border: none;
}

/* ================================================================ */
/*  SYNTAX HIGHLIGHTING (built-in)                                   */
/* ================================================================ */
.hl-kw { color: #c792ea; }
.hl-str { color: #c3e88d; }
.hl-num { color: #f78c6c; }
.hl-cm { color: #546e7a; font-style: italic; }
.hl-fn { color: #82aaff; }
.hl-op { color: #89ddff; }
.hl-type { color: #ffcb6b; }
.hl-tag { color: #f07178; }
.hl-attr { color: #c792ea; }
.hl-val { color: #c3e88d; }
.hl-prop { color: #82aaff; }

/* ================================================================ */
/*  MOBILE                                                           */
/* ================================================================ */
@media (max-width: 768px) {
  .app { --sidebar-w: 0px; }
  .app:not(.sidebar-collapsed) .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 260px; z-index: 200;
    box-shadow: 4px 0 24px rgba(0,0,0,0.5);
  }
  .app.artifact-open { --artifact-w: 100vw; }
  .app.artifact-open .artifact-panel {
    position: fixed; inset: 0; z-index: 300;
  }
}

/* ================================================================ */
/*  SCROLLBAR FOR ALL                                                */
/* ================================================================ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 12px;
  color: var(--text-dim);
  padding: 40px;
}
.empty-state-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.08em;
}
.empty-state-sub {
  font-size: 14px;
  font-weight: 300;
  color: var(--text-dim);
  text-align: center;
  max-width: 400px;
  line-height: 1.5;
}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">JOAO</div>
      <button class="new-chat-btn" id="newChatBtn">+ New</button>
    </div>
    <div class="conv-list" id="convList"></div>
  </div>

  <!-- TOP BAR -->
  <div class="topbar">
    <button class="toggle-sidebar-btn" id="toggleSidebar" title="Toggle sidebar">&#9776;</button>
    <div class="topbar-model" id="topbarModel">SONNET 4</div>
    <input class="topbar-session" id="sessionName" placeholder="New conversation" spellcheck="false">
    <div class="topbar-tokens" id="tokenCount">~0 tokens</div>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-title">JOAO</div>
      <div class="empty-state-sub">Your persistent AI companion with full server access, Council dispatch, and tool execution.</div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea class="input-textarea" id="userInput" placeholder="Message JOAO..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" title="Send">&#9654;</button>
    </div>
  </div>

  <!-- ARTIFACT PANEL -->
  <div class="artifact-panel" id="artifactPanel">
    <div class="artifact-header">
      <div class="artifact-tabs" id="artifactTabs"></div>
      <button class="artifact-fullscreen-btn" id="artifactFullscreen" title="Fullscreen">&#x26F6;</button>
      <button class="artifact-close-btn" id="artifactClose" title="Close">&times;</button>
    </div>
    <div class="artifact-body" id="artifactBody">
      <button class="artifact-copy-btn" id="artifactCopy">Copy</button>
      <div class="artifact-code" id="artifactCode"></div>
    </div>
  </div>

</div>

<script>
// ================================================================
// CONFIG
// ================================================================
const SPINE_URL = (() => {
  const loc = window.location;
  if (loc.hostname === 'localhost' || loc.hostname === '127.0.0.1' || loc.hostname.startsWith('192.168'))
    return loc.protocol + '//' + loc.hostname + ':7772';
  if (loc.hostname.includes('joao.theartofthepossible'))
    return loc.origin;
  return 'https://joao-spine-production.up.railway.app';
})();

// ================================================================
// STATE
// ================================================================
const STORE_KEY = 'joao_conversations_v2';
let conversations = [];
let activeConvId = null;
let isStreaming = false;
let artifacts = [];

// ================================================================
// DOM
// ================================================================
const $ = s => document.querySelector(s);
const app = $('#app');
const chatArea = $('#chatArea');
const userInput = $('#userInput');
const sendBtn = $('#sendBtn');
const convList = $('#convList');
const sessionName = $('#sessionName');
const tokenCount = $('#tokenCount');
const emptyState = $('#emptyState');
const artifactPanel = $('#artifactPanel');
const artifactTabs = $('#artifactTabs');
const artifactCode = $('#artifactCode');
const artifactBody = $('#artifactBody');

// ================================================================
// CONVERSATIONS (localStorage)
// ================================================================
function loadConversations() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    conversations = raw ? JSON.parse(raw) : [];
  } catch { conversations = []; }
}

function saveConversations() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(conversations));
  } catch (e) { console.warn('Save failed:', e); }
}

function getActiveConv() {
  return conversations.find(c => c.id === activeConvId);
}

function newConversation() {
  const conv = {
    id: (crypto.randomUUID ? crypto.randomUUID() : 'conv-' + Date.now()),
    name: '',
    messages: [],
    created: Date.now(),
  };
  conversations.unshift(conv);
  activeConvId = conv.id;
  saveConversations();
  renderSidebar();
  renderChat();
  sessionName.value = '';
  userInput.focus();
}

function switchConversation(id) {
  activeConvId = id;
  renderSidebar();
  renderChat();
  const conv = getActiveConv();
  sessionName.value = conv ? conv.name : '';
  updateTokenCount();
}

function deleteConversation(id) {
  conversations = conversations.filter(c => c.id !== id);
  if (activeConvId === id) {
    activeConvId = conversations.length ? conversations[0].id : null;
    if (!activeConvId) newConversation();
    else { renderChat(); sessionName.value = getActiveConv()?.name || ''; }
  }
  saveConversations();
  renderSidebar();
}

function autoNameConversation(text) {
  const conv = getActiveConv();
  if (!conv || conv.name) return;
  conv.name = text.slice(0, 60).replace(/\n/g, ' ');
  sessionName.value = conv.name;
  saveConversations();
  renderSidebar();
}

// ================================================================
// SIDEBAR RENDER
// ================================================================
function renderSidebar() {
  convList.innerHTML = '';
  for (const c of conversations) {
    const div = document.createElement('div');
    div.className = 'conv-item' + (c.id === activeConvId ? ' active' : '');
    div.textContent = c.name || 'New conversation';
    div.onclick = () => switchConversation(c.id);

    const del = document.createElement('button');
    del.className = 'conv-delete';
    del.innerHTML = '&times;';
    del.onclick = (e) => { e.stopPropagation(); deleteConversation(c.id); };
    const acts = document.createElement('span');
    acts.className = 'conv-item-actions';
    acts.appendChild(del);
    div.appendChild(acts);

    convList.appendChild(div);
  }
}

// ================================================================
// MARKDOWN RENDERER (minimal, no deps)
// ================================================================
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(md) {
  if (!md) return '';
  let html = escHtml(md);

  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const highlighted = highlightSyntax(code, lang);
    return '<div class="code-block-wrap"><button class="code-copy-btn" onclick="copyCode(this)">Copy</button><pre><code>' + highlighted + '</code></pre></div>';
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic
  html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');

  // Ordered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

  // Paragraphs (double newline)
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>\s*<(h[123]|ul|ol|pre|blockquote|div)/g, '<$1');
  html = html.replace(/<\/(h[123]|ul|ol|pre|blockquote|div)>\s*<\/p>/g, '</$1>');

  // Single newlines to br inside paragraphs
  html = html.replace(/\n/g, '<br>');

  return html;
}

// ================================================================
// SYNTAX HIGHLIGHTER (built-in, no deps)
// ================================================================
function highlightSyntax(code, lang) {
  if (!lang) return code;
  const l = lang.toLowerCase();

  // Keywords per language
  const kwMap = {
    js: /\b(const|let|var|function|return|if|else|for|while|class|import|export|from|async|await|new|this|try|catch|throw|switch|case|break|default|typeof|instanceof|in|of|yield|null|undefined|true|false)\b/g,
    javascript: /\b(const|let|var|function|return|if|else|for|while|class|import|export|from|async|await|new|this|try|catch|throw|switch|case|break|default|typeof|instanceof|in|of|yield|null|undefined|true|false)\b/g,
    python: /\b(def|class|return|if|elif|else|for|while|import|from|as|try|except|finally|raise|with|yield|lambda|pass|break|continue|and|or|not|is|in|None|True|False|self|async|await|print)\b/g,
    py: /\b(def|class|return|if|elif|else|for|while|import|from|as|try|except|finally|raise|with|yield|lambda|pass|break|continue|and|or|not|is|in|None|True|False|self|async|await|print)\b/g,
    bash: /\b(if|then|else|elif|fi|for|do|done|while|case|esac|function|return|exit|echo|export|source|cd|ls|grep|sed|awk|cat|mkdir|rm|cp|mv|chmod|chown|sudo|apt|pip|npm|git|ssh|curl|wget)\b/g,
    sh: /\b(if|then|else|elif|fi|for|do|done|while|case|esac|function|return|exit|echo|export|source|cd|ls|grep|sed|awk|cat|mkdir|rm|cp|mv|chmod|chown|sudo|apt|pip|npm|git|ssh|curl|wget)\b/g,
    json: /("(?:[^"\\]|\\.)*")\s*:/g,
    html: /(&lt;\/?)([\w-]+)/g,
    css: /\b(color|background|border|margin|padding|display|flex|grid|font|position|width|height|top|left|right|bottom|z-index|overflow|opacity|transition|transform|animation)\b/g,
    sql: /\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|ON|INSERT|INTO|VALUES|UPDATE|SET|DELETE|CREATE|TABLE|ALTER|DROP|INDEX|GROUP|BY|ORDER|ASC|DESC|HAVING|LIMIT|OFFSET|UNION|AND|OR|NOT|NULL|AS|DISTINCT|COUNT|SUM|AVG|MAX|MIN|CASE|WHEN|THEN|ELSE|END|EXISTS|IN|LIKE|BETWEEN|IS)\b/gi,
  };

  let h = code;

  // Comments first (preserve them)
  h = h.replace(/(\/\/.*$|#.*$)/gm, '<span class="hl-cm">$1</span>');
  h = h.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="hl-cm">$1</span>');

  // Strings
  h = h.replace(/(?<!class=")("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)/g, (m) => {
    if (m.includes('class="hl-')) return m;
    return '<span class="hl-str">' + m + '</span>';
  });

  // Numbers
  h = h.replace(/\b(\d+\.?\d*)\b/g, (m, n, offset, str) => {
    const before = str.slice(Math.max(0, offset - 15), offset);
    if (before.includes('hl-')) return m;
    return '<span class="hl-num">' + n + '</span>';
  });

  // Language keywords
  const kwRe = kwMap[l];
  if (kwRe) {
    if (l === 'json') {
      h = h.replace(kwRe, '<span class="hl-prop">$1</span>:');
    } else if (l === 'html') {
      h = h.replace(kwRe, '$1<span class="hl-tag">$2</span>');
    } else {
      h = h.replace(kwRe, (m, kw) => {
        return '<span class="hl-kw">' + kw + '</span>';
      });
    }
  }

  return h;
}

// ================================================================
// CHAT RENDER
// ================================================================
function renderChat() {
  chatArea.innerHTML = '';
  artifacts = [];
  const conv = getActiveConv();
  if (!conv || conv.messages.length === 0) {
    chatArea.innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-state-title">JOAO</div><div class="empty-state-sub">Your persistent AI companion with full server access, Council dispatch, and tool execution.</div></div>';
    return;
  }
  for (const msg of conv.messages) {
    if (msg.role === 'user') {
      appendUserBubble(msg.content);
    } else if (msg.role === 'assistant') {
      appendAssistantBubble(msg.content);
    } else if (msg.role === 'tool') {
      appendToolCard(msg);
    }
  }
  collectArtifacts(conv.messages);
  chatArea.scrollTop = chatArea.scrollHeight;
  updateTokenCount();
}

function appendUserBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble user';
  bubble.textContent = text;
  row.appendChild(bubble);
  chatArea.appendChild(row);
}

function appendAssistantBubble(text, streaming) {
  const row = document.createElement('div');
  row.className = 'msg-row';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble assistant';
  if (streaming) {
    bubble.id = 'streaming-bubble';
    bubble.textContent = '';
  } else {
    bubble.innerHTML = renderMarkdown(text);
  }
  row.appendChild(bubble);
  chatArea.appendChild(row);
  return bubble;
}

function appendToolCard(toolMsg) {
  const card = document.createElement('div');
  card.className = 'tool-card';
  const isDone = toolMsg.status === 'done';
  card.innerHTML = `
    <div class="tool-card-inner">
      <div class="tool-card-header" onclick="this.parentElement.classList.toggle('expanded')">
        <div class="tool-icon ${isDone ? 'done' : ''}">${isDone ? '&#10003;' : '&#9881;'}</div>
        <div class="tool-name">${escHtml(toolMsg.name || 'tool')}</div>
        ${toolMsg.duration ? '<div class="tool-duration">' + toolMsg.duration + '</div>' : ''}
        <div class="tool-chevron">&#9654;</div>
      </div>
      <div class="tool-card-body">
        <div class="tool-section-label">Parameters</div>
        <div class="tool-params">${escHtml(typeof toolMsg.params === 'string' ? toolMsg.params : JSON.stringify(toolMsg.params || {}, null, 2))}</div>
        ${toolMsg.result ? '<div class="tool-section-label">Result</div><div class="tool-result">' + escHtml(typeof toolMsg.result === 'string' ? toolMsg.result.slice(0, 2000) : JSON.stringify(toolMsg.result, null, 2).slice(0, 2000)) + '</div>' : ''}
      </div>
    </div>
  `;
  chatArea.appendChild(card);
}

// ================================================================
// THINKING INDICATOR
// ================================================================
const thinkingPhrases = [
  'Thinking...', 'Processing...', 'Analyzing...', 'Reading context...',
  'Working on it...', 'Reasoning...', 'Generating response...'
];
const toolThinkingPhrases = {
  'read_file': 'Reading file...',
  'write_file': 'Writing file...',
  'list_directory': 'Browsing files...',
  'search_files': 'Searching...',
  'run_command': 'Executing command...',
  'council_dispatch': 'Dispatching agent...',
  'council_status': 'Checking council...',
  'escalate_to_opus': 'Deep thinking (Opus)...',
  'drdata_analyze': 'Analyzing data...',
  'drdata_quality_scan': 'Running quality scan...',
};
let thinkingInterval = null;
let thinkingIdx = 0;

function showThinking(text) {
  removeThinking();
  const row = document.createElement('div');
  row.className = 'thinking-row';
  row.id = 'thinking-row';
  row.innerHTML = `<div class="thinking-indicator"><div class="thinking-dot"></div><span id="thinking-text">${escHtml(text || thinkingPhrases[0])}</span></div>`;
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;

  thinkingIdx = 0;
  thinkingInterval = setInterval(() => {
    const el = document.getElementById('thinking-text');
    if (!el) { clearInterval(thinkingInterval); return; }
    thinkingIdx = (thinkingIdx + 1) % thinkingPhrases.length;
    el.textContent = thinkingPhrases[thinkingIdx];
  }, 2200);
}

function updateThinking(text) {
  const el = document.getElementById('thinking-text');
  if (el) el.textContent = text;
}

function removeThinking() {
  if (thinkingInterval) { clearInterval(thinkingInterval); thinkingInterval = null; }
  const el = document.getElementById('thinking-row');
  if (el) el.remove();
}

// ================================================================
// ARTIFACTS
// ================================================================
function collectArtifacts(messages) {
  artifacts = [];
  for (const msg of messages) {
    if (msg.role !== 'assistant') continue;
    const re = /```(\w+)\n([\s\S]*?)```/g;
    let m;
    while ((m = re.exec(msg.content)) !== null) {
      artifacts.push({ lang: m[1], code: m[2], label: m[1] + ' #' + (artifacts.length + 1) });
    }
  }
  if (artifacts.length > 0) renderArtifactTabs();
}

function renderArtifactTabs() {
  artifactTabs.innerHTML = '';
  artifacts.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'artifact-tab' + (i === 0 ? ' active' : '');
    btn.textContent = a.label;
    btn.onclick = () => showArtifact(i);
    artifactTabs.appendChild(btn);
  });
}

function showArtifact(idx) {
  if (!artifacts[idx]) return;
  app.classList.add('artifact-open');
  artifactCode.innerHTML = highlightSyntax(escHtml(artifacts[idx].code), artifacts[idx].lang);
  artifactTabs.querySelectorAll('.artifact-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
}

$('#artifactClose').onclick = () => app.classList.remove('artifact-open');
$('#artifactFullscreen').onclick = () => artifactPanel.classList.toggle('fullscreen');
$('#artifactCopy').onclick = () => {
  const idx = [...artifactTabs.querySelectorAll('.artifact-tab')].findIndex(t => t.classList.contains('active'));
  if (artifacts[idx]) {
    navigator.clipboard.writeText(artifacts[idx].code).then(() => {
      $('#artifactCopy').textContent = 'Copied';
      setTimeout(() => $('#artifactCopy').textContent = 'Copy', 1500);
    });
  }
};

// ================================================================
// TOKEN COUNT
// ================================================================
function updateTokenCount() {
  const conv = getActiveConv();
  if (!conv) { tokenCount.textContent = '~0 tokens'; return; }
  let chars = 0;
  for (const m of conv.messages) {
    if (typeof m.content === 'string') chars += m.content.length;
  }
  const est = Math.round(chars / 4);
  tokenCount.textContent = '~' + est.toLocaleString() + ' tokens';
}

// ================================================================
// STREAMING CHAT
// ================================================================
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isStreaming) return;

  const conv = getActiveConv();
  if (!conv) return;

  isStreaming = true;
  sendBtn.disabled = true;
  userInput.value = '';
  autoResizeInput();

  // Hide empty state
  const es = document.getElementById('emptyState');
  if (es) es.remove();

  // Add user message
  conv.messages.push({ role: 'user', content: text });
  appendUserBubble(text);
  autoNameConversation(text);
  saveConversations();

  showThinking('Thinking...');
  chatArea.scrollTop = chatArea.scrollHeight;

  try {
    const apiMessages = conv.messages
      .filter(m => m.role === 'user' || m.role === 'assistant')
      .map(m => ({ role: m.role, content: m.content }));

    const res = await fetch(SPINE_URL + '/joao/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: apiMessages,
        session_id: conv.id,
      }),
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);

    removeThinking();
    const bubble = appendAssistantBubble('', true);
    let fullText = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6);

        if (payload === '[DONE]') continue;
        if (payload.startsWith('[ERROR]')) {
          fullText += '\n\n[Error: ' + payload.slice(8) + ']';
          bubble.innerHTML = renderMarkdown(fullText);
          continue;
        }

        // Tool execution events
        if (payload.startsWith('[Executing:')) {
          const toolNames = payload.slice(12, -4).split(',').map(s => s.trim());
          for (const tn of toolNames) {
            updateThinking(toolThinkingPhrases[tn] || 'Running ' + tn + '...');
            const toolMsg = { role: 'tool', name: tn, params: {}, status: 'running' };
            conv.messages.push(toolMsg);
            appendToolCard(toolMsg);
          }
          showThinking(toolThinkingPhrases[toolNames[0]] || 'Running tools...');
          chatArea.scrollTop = chatArea.scrollHeight;
          continue;
        }

        if (payload === '[Tools done, generating response...]') {
          // Mark last tool cards as done
          const toolCards = chatArea.querySelectorAll('.tool-card');
          toolCards.forEach(tc => {
            const icon = tc.querySelector('.tool-icon');
            if (icon && !icon.classList.contains('done')) {
              icon.classList.add('done');
              icon.innerHTML = '&#10003;';
            }
            const inner = tc.querySelector('.tool-card-inner');
            const msg = conv.messages.find(m => m.role === 'tool' && m.status === 'running');
            if (msg) msg.status = 'done';
          });
          removeThinking();
          showThinking('Generating response...');
          continue;
        }

        // Regular text token (JSON-encoded string from backend)
        let textChunk = payload;
        try {
          textChunk = JSON.parse(payload);
        } catch {
          // Not JSON, use raw
        }

        if (typeof textChunk === 'string') {
          removeThinking();
          fullText += textChunk;
          bubble.innerHTML = renderMarkdown(fullText);
          chatArea.scrollTop = chatArea.scrollHeight;
        }
      }
    }

    // Finalize
    conv.messages.push({ role: 'assistant', content: fullText });
    saveConversations();
    updateTokenCount();
    collectArtifacts(conv.messages);

    // If artifacts found, auto-open panel
    if (artifacts.length > 0) {
      showArtifact(artifacts.length - 1);
    }

  } catch (err) {
    removeThinking();
    appendAssistantBubble('[Connection error: ' + err.message + ']');
    console.error('Chat error:', err);
  }

  isStreaming = false;
  sendBtn.disabled = false;
  userInput.focus();
}

// ================================================================
// COPY CODE HELPER
// ================================================================
window.copyCode = function(btn) {
  const pre = btn.parentElement.querySelector('code');
  if (!pre) return;
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Copied';
    setTimeout(() => btn.textContent = 'Copy', 1200);
  });
};

// ================================================================
// INPUT AUTO-RESIZE
// ================================================================
function autoResizeInput() {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
}

userInput.addEventListener('input', autoResizeInput);
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener('click', sendMessage);

// SIDEBAR TOGGLE
// ================================================================
$('#toggleSidebar').addEventListener('click', () => {
  app.classList.toggle('sidebar-collapsed');
});

$('#newChatBtn').addEventListener('click', newConversation);

sessionName.addEventListener('change', () => {
  const conv = getActiveConv();
  if (conv) {
    conv.name = sessionName.value;
    saveConversations();
    renderSidebar();
  }
});

// ================================================================
// BOOT
// ================================================================
loadConversations();
if (conversations.length === 0) {
  newConversation();
} else {
  activeConvId = conversations[0].id;
}
renderSidebar();
renderChat();
sessionName.value = getActiveConv()?.name || '';
updateTokenCount();
userInput.focus();
</script>
