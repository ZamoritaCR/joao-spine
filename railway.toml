[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
startCommand = "sh -c 'uvicorn main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 75 --ws-ping-interval 20 --ws-ping-timeout 60'"
healthcheckPath = "/joao/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
